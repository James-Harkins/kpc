name: Pre-Trip Reminder Emails

on:
  schedule:
    - cron: '0 14 * * *'  # Daily at 2pm UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — skip date check and log without sending any emails'
        required: false
        default: 'false'
        type: boolean

jobs:
  send_reminders:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Run pre-trip reminder task
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          fly machine run . \
            --app kpc \
            --rm \
            --restart no \
            --env DRY_RUN=${{ github.event.inputs.dry_run || 'false' }} \
            -- bin/rails emails:send_pre_trip_reminder

      - name: Disable workflow after March 1 send
        if: github.event_name == 'schedule'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$(date +%m-%d)" = "03-01" ]; then
            gh workflow disable trip_reminder.yml --repo ${{ github.repository }}
            echo "Workflow disabled after March 1 send."
          fi
